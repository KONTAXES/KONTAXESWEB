<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link id="favicon" rel="icon" type="image/png" href="/K_white.png" />
    <script>
      (function(){
        var el=document.getElementById('favicon');
        function set(dark){el.href=dark?'/K_white.png':'/K_black.png';}
        var mq=window.matchMedia('(prefers-color-scheme: dark)');
        set(mq.matches);
        mq.addEventListener('change',function(e){set(e.matches);});
      })();
    </script>
